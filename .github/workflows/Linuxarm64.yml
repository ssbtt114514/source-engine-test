name: Build Linux ARM64 (Cross Compile)

on:
  workflow_dispatch:
    inputs:
      config_type:
        description: 'Build type'
        type: choice
        options:
          - debug
          - release
        default: release

jobs:
  build-linux-arm64:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install cross-compilation tools
      run: |
        sudo apt update
        sudo apt install -y \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          python3 \
          build-essential \
          ccache \
          pkg-config

    - name: Install ARM64 libraries
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt update
        sudo apt install -y \
          libsdl2-dev:arm64 \
          libfreetype6-dev:arm64 \
          libfontconfig1-dev:arm64 \
          libopenal-dev:arm64 \
          libjpeg-dev:arm64 \
          libpng-dev:arm64 \
          libcurl4-gnutls-dev:arm64 \
          libbz2-dev:arm64 \
          libedit-dev:arm64 \
          zlib1g-dev:arm64

    - name: Build for ARM64
      run: |
        export CC=aarch64-linux-gnu-gcc
        export CXX=aarch64-linux-gnu-g++
        export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
        export PKG_CONFIG_SYSROOT_DIR=/
        ./waf configure -T ${{ github.event.inputs.config_type }} --disable-warns
        ./waf build -j$(nproc)

    - name: Verify architecture
      run: |
        find build -name "hl2" -type f -exec file {} \; 2>/dev/null || \
        find build_dir -name "hl2" -type f -exec file {} \; 2>/dev/null || \
        echo "hl2 binary not found, listing build directory:"
        ls -la build/ 2>/dev/null || ls -la build_dir/ 2>/dev/null

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-arm64-${{ github.event.inputs.config_type }}
        path: |
          build/
          build_dir/